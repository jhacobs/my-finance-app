name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
      - name: Match tag to package version
        shell: bash
        run: |
          package_tag="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "$package_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_tag."
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows
            runner: windows-latest
            arch: x64
            artifact: windows-x64
          - name: macOS x64
            platform: macos
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
          - name: macOS arm64
            platform: macos
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
          - name: Linux x64
            platform: linux
            runner: ubuntu-24.04
            arch: x64
            artifact: linux-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Linux maker prerequisites
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install --yes fakeroot rpm
      - name: Install dependencies
        run: npm ci
      - name: Build distributables
        run: npm run make -- --arch=${{ matrix.arch }}
      - name: Verify distributables
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows)
              find out/make -type f -name '*Setup.exe' | grep -q .
              find out/make -type f -name '*.nupkg' | grep -q .
              find out/make -type f -name 'RELEASES' | grep -q .
              ;;
            macos)
              find out/make -type f -name '*.dmg' | grep -q .
              find out/make -type f -name '*.zip' | grep -q .
              ;;
            linux)
              find out/make -type f -name '*.deb' | grep -q .
              find out/make -type f -name '*.rpm' | grep -q .
              ;;
          esac
      - name: Upload distributables
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/**/*
          if-no-files-found: error
          overwrite: true
          retention-days: 14

  release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download distributables
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: release-assets
          merge-multiple: true
      - name: Create or update draft release
        shell: bash
        run: |
          existing_release=$(gh release view "$GITHUB_REF_NAME" --json isDraft 2>/dev/null || true)

          if [[ -n "$existing_release" ]]; then
            is_draft=$(jq -r '.isDraft' <<<"$existing_release")
            if [[ "$is_draft" != "true" ]]; then
              echo "Release $GITHUB_REF_NAME is already published; refusing to overwrite it."
              exit 1
            fi
          else
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi

          shopt -s globstar nullglob
          assets=(release-assets/**/*)
          files=()
          for asset in "${assets[@]}"; do
            if [[ -f "$asset" ]]; then
              files+=("$asset")
            fi
          done

          if (( ${#files[@]} == 0 )); then
            echo "No release assets were downloaded."
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
